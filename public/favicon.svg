<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="18" fill="#0a0a0a"/>
  <!-- Clapboard body -->
  <rect x="14" y="38" width="72" height="48" rx="4" fill="#1e1a12"/>
  <rect x="14" y="38" width="72" height="48" rx="4" fill="none" stroke="#C6993A" stroke-width="2"/>
  <!-- Clapboard arm (angled stripes) -->
  <rect x="14" y="20" width="72" height="22" rx="4" fill="#1e1a12" stroke="#C6993A" stroke-width="2"/>
  <!-- Diagonal stripes on arm -->
  <clipPath id="arm-clip">
    <rect x="14" y="20" width="72" height="22" rx="4"/>
  </clipPath>
  <g clip-path="url(#arm-clip)">
    <rect x="10" y="20" width="10" height="22" fill="#C6993A" opacity="0.85"/>
    <rect x="28" y="20" width="10" height="22" fill="#C6993A" opacity="0.85"/>
    <rect x="46" y="20" width="10" height="22" fill="#C6993A" opacity="0.85"/>
    <rect x="64" y="20" width="10" height="22" fill="#C6993A" opacity="0.85"/>
    <rect x="82" y="20" width="10" height="22" fill="#C6993A" opacity="0.85"/>
  </g>
  <!-- Arm hinge circles -->
  <circle cx="20" cy="42" r="4" fill="#2e2618" stroke="#C6993A" stroke-width="1.5"/>
  <circle cx="80" cy="42" r="4" fill="#2e2618" stroke="#C6993A" stroke-width="1.5"/>
  <!-- Film perforations top -->
  <rect x="22" y="38" width="6" height="4" rx="1" fill="#0a0a0a"/>
  <rect x="36" y="38" width="6" height="4" rx="1" fill="#0a0a0a"/>
  <rect x="50" y="38" width="6" height="4" rx="1" fill="#0a0a0a"/>
  <rect x="64" y="38" width="6" height="4" rx="1" fill="#0a0a0a"/>
  <!-- Text area lines -->
  <line x1="22" y1="58" x2="78" y2="58" stroke="#C6993A" stroke-width="1" opacity="0.3"/>
  <line x1="22" y1="68" x2="78" y2="68" stroke="#C6993A" stroke-width="1" opacity="0.3"/>
  <!-- AI text -->
  <text x="50" y="55" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#C6993A" letter-spacing="2">AI</text>
  <text x="50" y="78" text-anchor="middle" font-family="monospace" font-size="7" fill="#C6993A" opacity="0.7" letter-spacing="1">FILM</text>
</svg>
