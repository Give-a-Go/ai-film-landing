    <style>
      :root {
        --bg: #050505;
        --surface: #0a0a0a;
        --gold: rgba(198,153,58,0.97);
        --gold-raw: #C6993A;
        --gold-light: #D4AF5A;
        --gold-pale: #E8D5A3;
        --gold-dim: #5A4D2E;
        --bone: #E0D5C0;
        --muted: #4A4232;
        --border: #1E1A12;
      }
      
      body {
        font-family: "IBM Plex Sans", sans-serif;
        background-color: var(--bg);
        color: var(--bone);
        overflow-x: hidden;
      }
      
      /* Film grain overlay */
      .film-grain {
        position: relative;
      }
      .film-grain::after {
        content: '';
        position: fixed;
        inset: 0;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 200px 200px;
        pointer-events: none;
        z-index: 9999;
      }
      
      /* Deep vignette */
      .vignette {
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse 70% 70% at center, transparent 30%, var(--bg) 100%);
        pointer-events: none;
        z-index: 100;
      }
      
      .perspective-container {
        perspective: 1200px;
        transform-style: preserve-3d;
      }
      .preserve-3d {
        transform-style: preserve-3d;
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--gold-dim);
        opacity: 0.3;
        border-radius: 2px;
      }

      /* Hide scrollbar for cleaner look during dev, optional */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }


      /* Custom scrollbar for teleprompter modal */
      #teleprompter-content::-webkit-scrollbar {
        width: 8px;
      }

      #teleprompter-content::-webkit-scrollbar-track {
        background: transparent;
      }

      #teleprompter-content::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
      }

      #teleprompter-content::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      /* For light mode */
      #teleprompter-content.light-mode::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.2);
      }

      #teleprompter-content.light-mode::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.3);
      }
    </style>
